name: renovate

on:
  schedule:
    # Monday early UTC. renovate.json gates the rest (before 6am Mon, Europe/Berlin).
    - cron: "0 0-5 * * 1"
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        type: choice
        options: [debug, info, warn]

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: renovatebot/github-action@v46.1.14
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
