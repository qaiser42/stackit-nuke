name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v8
        with:
          # v2.x is required because we target `go 1.26` in go.mod; older
          # golangci-lint binaries are built with go1.24 and refuse to load.
          version: v2.5.0

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go mod download
      - run: go test -timeout 120s -race -cover ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go build -o /tmp/stackit-nuke ./
      - run: /tmp/stackit-nuke --version
