version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    revive:
      rules:
        # Disable purely-stylistic rules that flood the output without finding
        # real bugs. The rest of revive's defaults stay on.
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: var-naming
          disabled: true
  exclusions:
    rules:
      - path: 'resources/.*\.go'
        linters: [revive]

formatters:
  enable:
    - gofmt
    - goimports
